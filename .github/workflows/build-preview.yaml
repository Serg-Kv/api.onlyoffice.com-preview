name: Build preview

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: preview-build
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout preview repository
        uses: actions/checkout@v4
        with:
          path: preview

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: Serg-Kv/api.onlyoffice.com
          ref: gh-pages2
          path: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: source/package-lock.json

      - name: Install dependencies
        working-directory: source
        run: npm ci

      - name: Build preview site
        working-directory: source
        env:
          SITE_MODE: testing
          DOCUSAURUS_SITE_URL: https://serg-kv.github.io
          DOCUSAURUS_BASE_URL: /api.onlyoffice.com-preview/
          NODE_OPTIONS: --max-old-space-size=8192
          UV_THREADPOOL_SIZE: 4
          RSPACK_PARALLEL: 2
          RAYON_NUM_THREADS: 2
          TOKIO_WORKER_THREADS: 2
        run: |
          while true; do
            echo "Build still running at $(date -u +%H:%M:%S)"
            sleep 30
          done &
          heartbeat_pid=$!
          npm run build -- --locale en
          status=$?
          kill "$heartbeat_pid" || true
          exit "$status"

      - name: Replace preview files
        run: |
          rsync -a --delete \
            --exclude ".git/" \
            --exclude ".github/workflows/build-preview.yaml" \
            --exclude "__server/server.bundle.js" \
            --exclude "*/__server/server.bundle.js" \
            source/build/ preview/
          touch preview/.nojekyll

      - name: Commit and push preview build
        working-directory: preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No preview changes to commit."
          else
            git commit -m "Deploy preview build from gh-pages2"
            git push
          fi
